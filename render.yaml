# Render Blueprint: Postgres + NexGen API
# Dashboard → New → Blueprint → connect this repo.
# You will be prompted for env vars marked sync: false.
#
# Note: Render allows only one Free Postgres per workspace. If creation fails,
# remove or upgrade an existing free database, or set databases[0].plan to basic-256mb.

services:
  - type: web
    name: nexgen-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexgen-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: nexgen-db
    plan: free
    region: oregon
    databaseName: nexgen
